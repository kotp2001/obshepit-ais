{% extends 'base.html' %}
{% block title %}Отчёты и аналитика{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="card">
        <div class="card-header bg-dark text-white py-3">
            <h4 class="mb-0"><i class="fas fa-chart-line me-2"></i> Отчёты и аналитика</h4>
        </div>
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="fw-bold mb-2">Период</label>
                    <select id="period-select" class="form-control">
                        <option value="day">За сегодня</option>
                        <option value="week" selected>За неделю</option>
                        <option value="month">За месяц</option>
                    </select>
                </div>
                <div class="col-md-8 d-flex align-items-end">
                    <button class="btn btn-primary" onclick="loadReports()">
                        <i class="fas fa-chart-simple me-1"></i> Обновить отчёты
                    </button>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card text-center bg-primary text-white">
                        <div class="card-body">
                            <i class="fas fa-dollar-sign fa-2x mb-2"></i>
                            <h6 class="mb-2">Общая выручка</h6>
                            <h2 id="total-revenue">0 ₽</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card text-center bg-success text-white">
                        <div class="card-body">
                            <i class="fas fa-receipt fa-2x mb-2"></i>
                            <h6 class="mb-2">Всего заказов</h6>
                            <h2 id="total-orders">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card text-center bg-warning text-white">
                        <div class="card-body">
                            <i class="fas fa-calculator fa-2x mb-2"></i>
                            <h6 class="mb-2">Средний чек</h6>
                            <h2 id="avg-check">0 ₽</h2>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-7">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="fas fa-chart-line me-2"></i> Продажи по дням</h6>
                        </div>
                        <div class="card-body">
                            <canvas id="sales-chart" width="100%" height="300"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="fas fa-trophy me-2"></i> Популярные блюда</h6>
                        </div>
                        <div class="card-body">
                            <div id="popular-dishes">
                                <div class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let chart = null;
    
    function loadReports() {
        let period = document.getElementById('period-select').value;
        
        fetch(`/api/reports/?period=${period}`)
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('total-revenue').innerHTML = data.data.total_revenue.toFixed(2) + ' ₽';
                    document.getElementById('total-orders').innerHTML = data.data.total_orders;
                    document.getElementById('avg-check').innerHTML = data.data.avg_check.toFixed(2) + ' ₽';
                    
                    let popularHtml = '';
                    if (data.data.popular_dishes.length > 0) {
                        popularHtml = '<div class="list-group">';
                        data.data.popular_dishes.forEach((dish, index) => {
                            popularHtml += `
                                <div class="list-group-item d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="badge bg-primary rounded-pill me-2">${index + 1}</span>
                                        <strong>${dish.name}</strong>
                                    </div>
                                    <span class="badge bg-success rounded-pill">${dish.count} шт</span>
                                </div>
                            `;
                        });
                        popularHtml += '</div>';
                    } else {
                        popularHtml = '<p class="text-muted text-center">Нет данных о продажах</p>';
                    }
                    document.getElementById('popular-dishes').innerHTML = popularHtml;
                    
                    if (chart) chart.destroy();
                    let ctx = document.getElementById('sales-chart').getContext('2d');
                    chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.data.daily_data.map(d => d.date),
                            datasets: [{
                                label: 'Выручка (₽)',
                                data: data.data.daily_data.map(d => d.revenue),
                                borderColor: '#667eea',
                                backgroundColor: 'rgba(102,126,234,0.1)',
                                tension: 0.3,
                                fill: true,
                                borderWidth: 2,
                                pointBackgroundColor: '#667eea',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                pointRadius: 5,
                                pointHoverRadius: 7
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { position: 'top' },
                                tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(2)} ₽` } }
                            },
                            scales: { y: { beginAtZero: true, ticks: { callback: (v) => v + ' ₽' } } }
                        }
                    });
                }
            });
    }
    
    loadReports();
</script>
{% endblock %}
