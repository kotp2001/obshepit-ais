{% extends 'base.html' %}
{% block title %}Отчёты и аналитика{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">Панель управления</h4>
        </div>
        <div class="card-body">
            <!-- Фильтр периода -->
            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">Период</label>
                    <select id="period-select" class="form-control">
                        <option value="day">Сегодня</option>
                        <option value="week" selected>Неделя</option>
                        <option value="month">Месяц</option>
                    </select>
                </div>
                <div class="col-md-9 d-flex gap-2 align-items-end">
                    <button class="btn btn-primary btn-sm" onclick="loadReports()">Обновить</button>
                    <button class="btn btn-success btn-sm" onclick="window.location.href='/export/orders/'">Экспорт заказов</button>
                    <button class="btn btn-info btn-sm" onclick="window.location.href='/export/popular/'">Экспорт блюд</button>
                </div>
            </div>
            
            <!-- Карточки статистики -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <div class="card text-center" style="background: rgba(26,26,74,0.9);">
                        <div class="card-body py-2">
                            <h6 style="color: rgba(255,255,255,0.7);">Выручка</h6>
                            <h3 id="total-revenue" style="color: #ffd700; margin: 0;">0 ₽</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center" style="background: rgba(42,90,42,0.9);">
                        <div class="card-body py-2">
                            <h6 style="color: rgba(255,255,255,0.7);">Заказов</h6>
                            <h3 id="total-orders" style="color: #ffd700; margin: 0;">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center" style="background: rgba(212,160,23,0.9);">
                        <div class="card-body py-2">
                            <h6 style="color: rgba(255,255,255,0.7);">Средний чек</h6>
                            <h3 id="avg-check" style="color: #ffd700; margin: 0;">0 ₽</h3>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Продажи по дням -->
            <div class="row mb-3">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header py-2">
                            <h6 class="mb-0">Продажи по дням</h6>
                        </div>
                        <div class="card-body py-2">
                            <div class="table-responsive">
                                <table class="table table-sm table-dark" style="font-size: 12px;">
                                    <thead>
                                        <tr id="table-dates">
                                            <th>Дата</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr id="table-revenue">
                                            <td><strong>Выручка</strong></td>
                                        </tr>
                                        <tr id="table-orders">
                                            <td><strong>Заказы</strong></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Популярные блюда -->
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header py-2">
                            <h6 class="mb-0">Популярные блюда за период</h6>
                        </div>
                        <div class="card-body py-2">
                            <div id="popular-dishes">
                                <div class="text-center py-2">
                                    <div class="spinner-border text-primary" style="width: 25px; height: 25px;" role="status"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadReports() {
        let period = document.getElementById('period-select').value;
        
        try {
            const response = await fetch(`/api/reports/?period=${period}`);
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('total-revenue').innerHTML = data.data.total_revenue.toFixed(2) + ' ₽';
                document.getElementById('total-orders').innerHTML = data.data.total_orders;
                document.getElementById('avg-check').innerHTML = data.data.avg_check.toFixed(2) + ' ₽';
                
                // Таблица продаж по дням
                let datesHtml = '<th>Дата</th>';
                let revenueHtml = '<td><strong>Выручка</strong></td>';
                let ordersHtml = '<td><strong>Заказы</strong></td>';
                
                for (let day of data.data.daily_data) {
                    datesHtml += `<th>${day.date}</th>`;
                    revenueHtml += `<td>${day.revenue.toFixed(2)} ₽</td>`;
                    ordersHtml += `<td>${day.orders} шт</td>`;
                }
                
                document.getElementById('table-dates').innerHTML = datesHtml;
                document.getElementById('table-revenue').innerHTML = revenueHtml;
                document.getElementById('table-orders').innerHTML = ordersHtml;
                
                // Популярные блюда
                let popularHtml = '';
                if (data.data.popular_dishes && data.data.popular_dishes.length > 0) {
                    popularHtml = `
                        <table class="table table-sm table-dark" style="font-size: 12px;">
                            <thead>
                                <tr><th>Название</th><th>Продано</th><th>Выручка</th></tr>
                            </thead>
                            <tbody>
                    `;
                    data.data.popular_dishes.forEach((dish) => {
                        let revenue = dish.count * dish.price;
                        popularHtml += `
                            <tr>
                                <td>${dish.name}</td>
                                <td>${dish.count} шт</td>
                                <td>${revenue.toFixed(2)} ₽</td>
                            </tr>
                        `;
                    });
                    popularHtml += `</tbody></table>`;
                } else {
                    popularHtml = '<p class="text-center" style="color: rgba(255,255,255,0.7);">Нет данных</p>';
                }
                document.getElementById('popular-dishes').innerHTML = popularHtml;
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('popular-dishes').innerHTML = '<p class="text-center text-danger">Ошибка загрузки</p>';
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        loadReports();
    });
</script>

<style>
    .table-dark {
        background: rgba(30,30,70,0.5);
    }
    .table-dark th {
        color: #ffd700;
        font-weight: 600;
    }
    .table-dark td {
        color: white;
    }
</style>
{% endblock %}
