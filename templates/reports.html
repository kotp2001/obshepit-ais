{% extends 'base.html' %}
{% block title %}Отчёты и аналитика{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">Отчёты и аналитика</h4>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Период</label>
                    <select id="period-select" class="form-control">
                        <option value="day">За сегодня</option>
                        <option value="week" selected>За неделю</option>
                        <option value="month">За месяц</option>
                    </select>
                </div>
                <div class="col-md-8 d-flex gap-2">
                    <button class="btn btn-primary btn-sm" onclick="loadReports()">Обновить</button>
                    <button class="btn btn-success btn-sm" onclick="window.location.href='/export/orders/'">Экспорт заказов</button>
                    <button class="btn btn-info btn-sm" onclick="window.location.href='/export/popular/'">Экспорт блюд</button>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-2">
                    <div class="card text-center" style="background: rgba(26,26,74,0.9); padding: 10px;">
                        <h6 style="color: rgba(255,255,255,0.7); margin: 0;">Общая выручка</h6>
                        <h3 id="total-revenue" style="color: #ffd700; margin: 5px 0;">0 ₽</h3>
                    </div>
                </div>
                <div class="col-md-4 mb-2">
                    <div class="card text-center" style="background: rgba(42,90,42,0.9); padding: 10px;">
                        <h6 style="color: rgba(255,255,255,0.7); margin: 0;">Всего заказов</h6>
                        <h3 id="total-orders" style="color: #ffd700; margin: 5px 0;">0</h3>
                    </div>
                </div>
                <div class="col-md-4 mb-2">
                    <div class="card text-center" style="background: rgba(212,160,23,0.9); padding: 10px;">
                        <h6 style="color: rgba(255,255,255,0.7); margin: 0;">Средний чек</h6>
                        <h3 id="avg-check" style="color: #ffd700; margin: 5px 0;">0 ₽</h3>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header py-2">
                            <h6 class="mb-0">Продажи по дням</h6>
                        </div>
                        <div class="card-body py-2" style="min-height: 300px;">
                            <canvas id="sales-chart" width="100%" height="250"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row mt-3">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header py-2">
                            <h6 class="mb-0">Популярные блюда</h6>
                        </div>
                        <div class="card-body py-2">
                            <div id="popular-dishes">
                                <div class="text-center py-2">
                                    <div class="spinner-border text-primary" style="width: 25px; height: 25px;" role="status"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let chart = null;
    
    async function loadReports() {
        let period = document.getElementById('period-select').value;
        
        try {
            const response = await fetch(`/api/reports/?period=${period}`);
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('total-revenue').innerHTML = data.data.total_revenue.toFixed(2) + ' ₽';
                document.getElementById('total-orders').innerHTML = data.data.total_orders;
                document.getElementById('avg-check').innerHTML = data.data.avg_check.toFixed(2) + ' ₽';
                
                let popularHtml = '';
                if (data.data.popular_dishes && data.data.popular_dishes.length > 0) {
                    popularHtml = '<div class="row">';
                    data.data.popular_dishes.forEach((dish, index) => {
                        popularHtml += `
                            <div class="col-md-4 col-sm-6 mb-2">
                                <div class="d-flex justify-content-between align-items-center p-2" style="background: rgba(50,50,100,0.5); border-radius: 8px;">
                                    <div>
                                        <span style="background: #ffd700; color: #1a1a4a; padding: 0px 8px; border-radius: 10px; font-size: 12px;">${index + 1}</span>
                                        <strong class="ms-2" style="color: white; font-size: 13px;">${dish.name}</strong>
                                    </div>
                                    <span style="color: #ffd700; font-size: 13px;">${dish.count} шт</span>
                                </div>
                            </div>
                        `;
                    });
                    popularHtml += '</div>';
                } else {
                    popularHtml = '<p class="text-center" style="color: rgba(255,255,255,0.7);">Нет данных</p>';
                }
                document.getElementById('popular-dishes').innerHTML = popularHtml;
                
                // Данные для графика
                let labels = data.data.daily_data.map(d => d.date);
                let revenues = data.data.daily_data.map(d => d.revenue);
                
                if (chart) chart.destroy();
                let ctx = document.getElementById('sales-chart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Выручка (₽)',
                            data: revenues,
                            borderColor: '#ffd700',
                            backgroundColor: 'rgba(255,215,0,0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: '#ffd700',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { 
                                position: 'top', 
                                labels: { color: 'white', font: { size: 11 } }
                            },
                            tooltip: { 
                                callbacks: { 
                                    label: function(context) {
                                        return context.raw.toFixed(2) + ' ₽';
                                    }
                                }
                            }
                        },
                        scales: { 
                            x: { 
                                ticks: { color: 'white', font: { size: 10 } }, 
                                grid: { display: false },
                                title: { display: true, text: 'Дата', color: '#ffd700', font: { size: 11 } }
                            },
                            y: { 
                                beginAtZero: true, 
                                ticks: { color: 'white', callback: function(val) { return val + ' ₽'; }, font: { size: 10 } }, 
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                title: { display: true, text: 'Выручка (₽)', color: '#ffd700', font: { size: 11 } }
                            }
                        }
                    }
                });
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('popular-dishes').innerHTML = '<p class="text-center text-danger">Ошибка загрузки</p>';
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        loadReports();
    });
</script>
{% endblock %}
