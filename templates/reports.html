{% extends 'base.html' %}
{% block title %}Отчёты и аналитика{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">Отчёты и аналитика</h4>
        </div>
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label">Период</label>
                    <select id="period-select" class="form-control">
                        <option value="day">За сегодня</option>
                        <option value="week" selected>За неделю</option>
                        <option value="month">За месяц</option>
                    </select>
                </div>
                <div class="col-md-8 d-flex align-items-end gap-2">
                    <button class="btn btn-primary" onclick="loadReports()">Обновить отчёты</button>
                    <button class="btn btn-success" onclick="window.location.href='/export/orders/'">Экспорт заказов в Excel</button>
                    <button class="btn btn-info" onclick="window.location.href='/export/popular/'">Экспорт популярных блюд</button>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card text-center" style="background: rgba(26,26,74,0.9);">
                        <div class="card-body">
                            <h3 class="mb-2">💰</h3>
                            <h6 class="mb-2" style="color: rgba(255,255,255,0.8);">Общая выручка</h6>
                            <h2 id="total-revenue" style="color: #ffd700;">0 ₽</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card text-center" style="background: rgba(42,90,42,0.9);">
                        <div class="card-body">
                            <h3 class="mb-2">📋</h3>
                            <h6 class="mb-2" style="color: rgba(255,255,255,0.8);">Всего заказов</h6>
                            <h2 id="total-orders" style="color: #ffd700;">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card text-center" style="background: rgba(212,160,23,0.9);">
                        <div class="card-body">
                            <h3 class="mb-2">📊</h3>
                            <h6 class="mb-2" style="color: rgba(255,255,255,0.8);">Средний чек</h6>
                            <h2 id="avg-check" style="color: #ffd700;">0 ₽</h2>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-7">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0">Продажи по дням</h6>
                        </div>
                        <div class="card-body">
                            <canvas id="sales-chart" width="100%" height="250"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0">Популярные блюда</h6>
                        </div>
                        <div class="card-body">
                            <div id="popular-dishes">
                                <div class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let chart = null;
    
    function loadReports() {
        let period = document.getElementById('period-select').value;
        
        fetch(`/api/reports/?period=${period}`)
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('total-revenue').innerHTML = data.data.total_revenue.toFixed(2) + ' ₽';
                    document.getElementById('total-orders').innerHTML = data.data.total_orders;
                    document.getElementById('avg-check').innerHTML = data.data.avg_check.toFixed(2) + ' ₽';
                    
                    let popularHtml = '';
                    if (data.data.popular_dishes.length > 0) {
                        popularHtml = '<div class="list-group">';
                        data.data.popular_dishes.forEach((dish, index) => {
                            popularHtml += `
                                <div class="list-group-item d-flex justify-content-between align-items-center" style="background: rgba(50,50,100,0.5); color: white; border-color: rgba(255,255,255,0.1);">
                                    <div>
                                        <span class="badge" style="background: #ffd700; color: #1a1a4a;">${index + 1}</span>
                                        <strong class="ms-2" style="color: white;">${dish.name}</strong>
                                    </div>
                                    <span class="badge bg-success">${dish.count} шт</span>
                                </div>
                            `;
                        });
                        popularHtml += '</div>';
                    } else {
                        popularHtml = '<p class="text-center" style="color: rgba(255,255,255,0.7);">Нет данных о продажах</p>';
                    }
                    document.getElementById('popular-dishes').innerHTML = popularHtml;
                    
                    if (chart) chart.destroy();
                    let ctx = document.getElementById('sales-chart').getContext('2d');
                    chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.data.daily_data.map(d => d.date),
                            datasets: [{
                                label: 'Выручка (₽)',
                                data: data.data.daily_data.map(d => d.revenue),
                                borderColor: '#ffd700',
                                backgroundColor: 'rgba(255,215,0,0.1)',
                                tension: 0.3,
                                fill: true,
                                borderWidth: 2,
                                pointBackgroundColor: '#ffd700',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { position: 'top', labels: { color: 'white', font: { size: 11 } } },
                                tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(2)} ₽` } }
                            },
                            scales: { 
                                x: { ticks: { color: 'white', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.1)' } },
                                y: { beginAtZero: true, ticks: { color: 'white', callback: (v) => v + ' ₽', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.1)' } }
                            }
                        }
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('popular-dishes').innerHTML = '<p class="text-center text-danger">Ошибка загрузки</p>';
            });
    }
    
    loadReports();
</script>
{% endblock %}
