<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Общепит - {% block title %}Ресторан{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 15px 0;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea !important;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .btn-custom {
            border-radius: 25px;
            padding: 10px 25px;
            font-weight: 500;
        }
        .footer {
            background: white;
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            color: #666;
        }
        .table-card {
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            padding: 20px;
        }
        .table-card:hover {
            transform: scale(1.05);
        }
        .table-free { background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); }
        .table-occupied { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .table-reserved { background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%); }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-new { background: #17a2b8; color: white; }
        .status-cooking { background: #ffc107; color: black; }
        .status-ready { background: #28a745; color: white; }
        .status-served { background: #6c757d; color: white; }
        .status-paid { background: #007bff; color: white; }
        .dish-card {
            margin-bottom: 20px;
        }
        .price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e74c3c;
        }
        .btn-add {
            background: #28a745;
            color: white;
            border-radius: 20px;
            padding: 5px 15px;
        }
        .cart-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .total {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-utensils me-2"></i>АИС Общепит
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="/menu/"><i class="fas fa-book"></i> Меню</a></li>
                    <li class="nav-item"><a class="nav-link" href="/booking/"><i class="fas fa-calendar-alt"></i> Бронирование</a></li>
                    <li class="nav-item"><a class="nav-link" href="/waiter/"><i class="fas fa-user"></i> Официант</a></li>
                    <li class="nav-item"><a class="nav-link" href="/kitchen/"><i class="fas fa-utensils"></i> Кухня</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/"><i class="fas fa-user-shield"></i> Админ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p class="mb-0">АИС Общепит - Система автоматизации ресторана © 2026</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
