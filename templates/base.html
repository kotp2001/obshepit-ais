<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Общепит - {% block title %}Ресторан{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        /* Звёздное небо */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .container {
            position: relative;
            z-index: 1;
        }
        
        /* Навигация */
        .navbar {
            background: rgba(20,20,50,0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd700 !important;
        }
        
        .navbar-brand i {
            margin-right: 8px;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.8) !important;
            transition: all 0.15s ease;
            border-radius: 20px;
            padding: 6px 16px !important;
            margin: 0 2px;
            font-weight: 500;
        }
        
        .nav-link:hover {
            background: rgba(255,215,0,0.2);
            color: #ffd700 !important;
            transform: translateY(-1px);
        }
        
        .nav-link:active {
            transform: translateY(1px);
        }
        
        /* Полупрозрачные карточки */
        .card {
            background: rgba(30,30,70,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        
        .card-header {
            background: rgba(20,20,50,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px 20px;
        }
        
        .card-body {
            color: white;
            padding: 20px;
        }
        
        /* Кнопки - только нажимаемые кнопки имеют анимацию */
        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: all 0.1s ease;
            border: none;
        }
        
        .btn-primary {
            background: #1a1a4a;
        }
        
        .btn-primary:hover {
            background: #2a2a5a;
            transform: translateY(-1px);
        }
        
        .btn-primary:active {
            transform: translateY(1px);
        }
        
        .btn-success {
            background: #2a5a2a;
        }
        
        .btn-success:hover {
            background: #3a6a3a;
            transform: translateY(-1px);
        }
        
        .btn-success:active {
            transform: translateY(1px);
        }
        
        .btn-warning {
            background: #d4a017;
            color: white;
        }
        
        .btn-warning:hover {
            background: #e4b027;
            transform: translateY(-1px);
        }
        
        .btn-warning:active {
            transform: translateY(1px);
        }
        
        .btn-info {
            background: #1780a0;
            color: white;
        }
        
        .btn-info:hover {
            background: #2790b0;
            transform: translateY(-1px);
        }
        
        .btn-info:active {
            transform: translateY(1px);
        }
        
        .btn-light {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .btn-light:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }
        
        .btn-light:active {
            transform: translateY(1px);
        }
        
        .btn-secondary {
            background: rgba(100,100,140,0.8);
            color: white;
        }
        
        .btn-secondary:hover {
            background: rgba(120,120,160,0.9);
            transform: translateY(-1px);
        }
        
        .btn-secondary:active {
            transform: translateY(1px);
        }
        
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        
        /* Столы */
        .table-card {
            cursor: pointer;
            transition: all 0.1s ease;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
        }
        
        .table-card:active {
            transform: scale(0.98);
        }
        
        .table-free {
            background: rgba(40,90,40,0.6);
            cursor: pointer;
        }
        
        .table-free:hover {
            background: rgba(50,110,50,0.7);
            transform: translateY(-2px);
        }
        
        .table-occupied {
            background: rgba(140,40,40,0.6);
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .table-reserved {
            background: rgba(140,100,30,0.6);
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .table-occupied:active, .table-reserved:active {
            transform: none;
        }
        
        /* Бейджи статусов */
        .status-badge {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* Футер */
       .footer {
    background: rgba(20,20,50,0.8);
    backdrop-filter: blur(10px);
    margin-top: 40px;
    padding: 15px;
    text-align: center;
    color: #ffd700;
    font-size: 13px;
    border-top: 1px solid rgba(255,255,255,0.1);
}
        
        /* Формы */
        .form-control {
            background: rgba(50,50,100,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .form-control:focus {
            background: rgba(60,60,110,0.9);
            border-color: #ffd700;
            color: white;
            box-shadow: none;
        }
        
        .form-label {
            color: rgba(255,255,255,0.9);
        }
        
        /* Модальное окно */
        .modal-content {
            background: rgba(30,30,70,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .modal-footer {
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        /* Анимация появления */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        
        /* Скролл */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30,30,70,0.5);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">АИС Общепит</a>
                <i class="fas fa-utensils"></i> АИС Общепит
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <ul class="navbar-nav ms-auto">
    <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
    <li class="nav-item"><a class="nav-link" href="/menu/">Меню</a></li>
    <li class="nav-item"><a class="nav-link" href="/booking/">Бронирование</a></li>
    <li class="nav-item" id="waiter-link" style="display: none;"><a class="nav-link" href="/waiter/">Зал</a></li>
    <li class="nav-item" id="kitchen-link" style="display: none;"><a class="nav-link" href="/kitchen/">Кухня</a></li>
    <li class="nav-item" id="admin-link" style="display: none;"><a class="nav-link" href="/admin-panel/">Админ панель</a></li>
    <li class="nav-item" id="logout-item" style="display: none;"><a class="nav-link" href="#" onclick="logout()">Выйти</a></li>
</ul>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p class="mb-0">АИС Общепит - Система автоматизации ресторана 2026</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Генерация звёзд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = 2 + Math.random() * 3 + 's';
                starsContainer.appendChild(star);

function checkAuth() {
    const role = localStorage.getItem('user_role');
    if (role === 'admin') {
        document.getElementById('admin-link').style.display = 'block';
        document.getElementById('waiter-link').style.display = 'block';
        document.getElementById('kitchen-link').style.display = 'block';
        document.getElementById('logout-item').style.display = 'block';
    } else if (role === 'waiter') {
        document.getElementById('waiter-link').style.display = 'block';
        document.getElementById('logout-item').style.display = 'block';
    } else if (role === 'chef') {
        document.getElementById('kitchen-link').style.display = 'block';
        document.getElementById('logout-item').style.display = 'block';
    }
}

function logout() {
    localStorage.removeItem('user_role');
    localStorage.removeItem('user_name');
    window.location.href = '/';
}

checkAuth();
            }
        }
        createStars();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
