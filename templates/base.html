<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Общепит - {% block title %}Ресторан{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .container {
            position: relative;
            z-index: 1;
        }
        
        .navbar {
            background: rgba(20,20,50,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd700 !important;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.8) !important;
            padding: 6px 16px !important;
            margin: 0 2px;
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: #ffd700 !important;
        }
        
        .card {
            background: rgba(30,30,70,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .card-header {
            background: rgba(20,20,50,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px 20px;
        }
        
        .card-body {
            color: white;
            padding: 20px;
        }
        
        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: transform 0.1s ease;
            border: none;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-warning {
            background: #ffd700;
            color: #1a1a4a;
        }
        
        .btn-warning:hover {
            background: #e6c200;
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: #1a1a4a;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2a2a5a;
            transform: translateY(-1px);
        }
        
        .btn-success {
            background: #2a5a2a;
            color: white;
        }
        
        .btn-success:hover {
            background: #3a6a3a;
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: rgba(100,100,140,0.8);
            color: white;
        }
        
        .form-control {
            background: rgba(50,50,100,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .form-control:focus {
            background: rgba(60,60,110,0.9);
            border-color: #ffd700;
            color: white;
            box-shadow: none;
        }
        
        .footer {
            background: rgba(20,20,50,0.8);
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            color: #ffd700;
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .table-card {
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        
        .table-card:active {
            transform: scale(0.98);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30,30,70,0.5);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">АИС Общепит</a>
            <div class="ms-auto">
                <button class="btn btn-danger btn-sm" onclick="logout()" id="logout-btn" style="display: none;">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p class="mb-0">АИС Общепит - Система автоматизации ресторана 2026</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = 2 + Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();
        
        function checkAuth() {
            const role = localStorage.getItem('user_role');
            const logoutBtn = document.getElementById('logout-btn');
            if (role) {
                logoutBtn.style.display = 'block';
            }
        }
        
        function logout() {
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_name');
            window.location.href = '/';
        }
        
        checkAuth();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
