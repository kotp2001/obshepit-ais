<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Общепит - {% block title %}Ресторан{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        /* Звёздное небо */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        @keyframes starMove {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(100px) translateY(-50px); }
        }
        
        .container {
            position: relative;
            z-index: 1;
        }
        
        /* Навигация */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 12px 0;
            border-radius: 0 0 15px 15px;
        }
        
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: bold;
            color: #1a1a4a !important;
        }
        
        .navbar-brand i {
            margin-right: 8px;
        }
        
        .nav-link {
            color: #333 !important;
            transition: all 0.15s ease;
            border-radius: 20px;
            padding: 6px 16px !important;
            margin: 0 2px;
            font-weight: 500;
        }
        
        .nav-link:hover {
            background: #1a1a4a;
            color: white !important;
            transform: translateY(-1px);
        }
        
        .nav-link:active {
            transform: translateY(1px);
        }
        
        /* Карточки */
        .card {
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: none;
            overflow: hidden;
            background: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        
        /* Кнопки - только нажимаемые кнопки имеют анимацию */
        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: transform 0.1s ease;
            border: none;
        }
        
        .btn-primary {
            background: #1a1a4a;
        }
        
        .btn-primary:hover {
            background: #2a2a5a;
            transform: translateY(-1px);
        }
        
        .btn-primary:active {
            transform: translateY(1px);
        }
        
        .btn-success {
            background: #2a5a2a;
        }
        
        .btn-success:hover {
            background: #3a6a3a;
            transform: translateY(-1px);
        }
        
        .btn-success:active {
            transform: translateY(1px);
        }
        
        .btn-warning {
            background: #d4a017;
            color: white;
        }
        
        .btn-warning:hover {
            background: #e4b027;
            transform: translateY(-1px);
        }
        
        .btn-warning:active {
            transform: translateY(1px);
        }
        
        .btn-info {
            background: #1780a0;
            color: white;
        }
        
        .btn-info:hover {
            background: #2790b0;
            transform: translateY(-1px);
        }
        
        .btn-info:active {
            transform: translateY(1px);
        }
        
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        
        /* Кнопки добавления в корзину */
        .btn-add {
            background: #2a5a2a;
            color: white;
            border-radius: 20px;
            padding: 6px 15px;
            transition: transform 0.1s ease;
        }
        
        .btn-add:hover {
            background: #3a6a3a;
            transform: translateY(-1px);
        }
        
        .btn-add:active {
            transform: translateY(1px);
        }
        
        /* Столы */
        .table-card {
            cursor: pointer;
            transition: transform 0.1s ease;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
        }
        
        .table-card:active {
            transform: scale(0.98);
        }
        
        .table-free {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            cursor: pointer;
        }
        
        .table-free:hover {
            transform: translateY(-2px);
        }
        
        .table-occupied {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%);
            cursor: default;
            opacity: 0.8;
        }
        
        .table-reserved {
            background: linear-gradient(135deg, #ffe0b2 0%, #ffcc80 100%);
            cursor: default;
            opacity: 0.8;
        }
        
        /* Не нажимаемые кнопки - без анимации */
        .table-occupied, .table-reserved {
            cursor: not-allowed;
        }
        
        .table-occupied:active, .table-reserved:active {
            transform: none;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #c0392b;
        }
        
        .footer {
            background: rgba(255, 255, 255, 0.9);
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            color: #333;
            font-size: 13px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-utensils"></i> АИС Общепит
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="/menu/"><i class="fas fa-book"></i> Меню</a></li>
                    <li class="nav-item"><a class="nav-link" href="/booking/"><i class="fas fa-calendar-alt"></i> Бронирование</a></li>
                    <li class="nav-item"><a class="nav-link" href="/waiter/"><i class="fas fa-user"></i> Официант</a></li>
                    <li class="nav-item"><a class="nav-link" href="/kitchen/"><i class="fas fa-utensils"></i> Кухня</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports/"><i class="fas fa-chart-line"></i> Отчёты</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/"><i class="fas fa-user-shield"></i> Админ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p class="mb-0">АИС Общепит - Система автоматизации ресторана 2026</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Генерация звёзд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = 2 + Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
