<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Общепит - {% block title %}Ресторан{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .container {
            position: relative;
            z-index: 1;
        }
        
        .navbar {
            background: rgba(20,20,50,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd700 !important;
        }
        
        .cart-icon {
            position: relative;
            cursor: pointer;
            margin-right: 15px;
            display: flex;
            align-items: center;
        }
        
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc3545;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .btn-logout:hover {
            background: #c82333;
            transform: translateY(-1px);
        }
        
        .card {
            background: rgba(30,30,70,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .card-header {
            background: rgba(20,20,50,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px 20px;
        }
        
        .card-body {
            color: white;
            padding: 20px;
        }
        
        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: transform 0.1s ease;
            border: none;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-warning {
            background: #ffd700;
            color: #1a1a4a;
        }
        
        .btn-warning:hover {
            background: #e6c200;
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: #1a1a4a;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2a2a5a;
            transform: translateY(-1px);
        }
        
        .btn-success {
            background: #2a5a2a;
            color: white;
        }
        
        .btn-success:hover {
            background: #3a6a3a;
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: rgba(100,100,140,0.8);
            color: white;
        }
        
        .form-control {
            background: rgba(50,50,100,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .form-control:focus {
            background: rgba(60,60,110,0.9);
            border-color: #ffd700;
            color: white;
            box-shadow: none;
        }
        
        .footer {
            background: rgba(20,20,50,0.8);
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            color: #ffd700;
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-content {
            background: rgba(20,20,60,0.95) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .modal-body {
            color: white;
        }
        
        .modal-body .form-label {
            color: white;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30,30,70,0.5);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
        
        .admin-card {
            transition: transform 0.1s ease;
        }
        
        .admin-card:active {
            transform: scale(0.98);
        }
        
        .admin-card:hover {
            transform: translateY(-3px);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">АИС Общепит</a>
            <div style="display: flex; align-items: center;">
                <div class="cart-icon" onclick="showGuestCart()" id="guest-cart-icon">
                    <i class="fas fa-shopping-cart" style="color: #ffd700; font-size: 1.3rem;"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </div>
                <button class="btn-logout" onclick="logout()" id="logout-btn" style="display: none;">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p class="mb-0">АИС Общепит - Система автоматизации ресторана 2026</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = 2 + Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();
        
        function updateGuestCartCount() {
            const cart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountSpan = document.getElementById('cart-count');
            if (cartCountSpan) {
                cartCountSpan.innerText = count;
            }
        }
        
        function showGuestCart() {
            const cart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
            if (cart.length === 0) {
                alert('Корзина пуста');
                return;
            }
            
            let itemsHtml = '';
            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                itemsHtml += `
                    <div class="d-flex justify-content-between align-items-center mb-2 pb-2" style="border-bottom: 1px solid rgba(255,255,255,0.2); color: white;">
                        <div>
                            <strong>${item.name}</strong>
                            <div>${item.price} ₽ × ${item.quantity}</div>
                        </div>
                        <div>
                            ${itemTotal} ₽
                            <button class="btn btn-sm btn-danger ms-2" onclick="removeFromGuestCart(${index})">Удалить</button>
                        </div>
                    </div>
                `;
            });
            
            const modalHtml = `
                <div class="modal fade" id="guestCartModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" style="color: #ffd700;">Моя корзина</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                ${itemsHtml}
                                <hr>
                                <div class="d-flex justify-content-between">
                                    <strong>Итого:</strong>
                                    <strong style="color: #ffd700;">${total} ₽</strong>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label">Количество гостей</label>
                                    <input type="number" id="guest-cart-guests" class="form-control" value="2" min="1" max="20">
                                </div>
                                <div class="mt-3">
                                    <label class="form-label">Номер стола (от 1 до 8)</label>
                                    <input type="number" id="guest-cart-table" class="form-control" placeholder="Введите номер стола" min="1" max="8">
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-warning" onclick="submitGuestOrder()">Оформить заказ</button>
                                <button class="btn btn-secondary" data-bs-dismiss="modal">Продолжить выбор</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            const oldModal = document.getElementById('guestCartModal');
            if (oldModal) oldModal.remove();
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('guestCartModal'));
            modal.show();
        }
        
        window.removeFromGuestCart = function(index) {
            let cart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('guest_cart', JSON.stringify(cart));
            updateGuestCartCount();
            const modalEl = document.getElementById('guestCartModal');
            if (modalEl) {
                const modal = bootstrap.Modal.getInstance(modalEl);
                if (modal) modal.hide();
            }
            showGuestCart();
        };
        
        async function submitGuestOrder() {
            const cart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
            const tableNumber = parseInt(document.getElementById('guest-cart-table').value);
            const guestCount = document.getElementById('guest-cart-guests').value;
            
            if (!tableNumber || isNaN(tableNumber)) {
                alert('Введите номер стола');
                return;
            }
            
            if (tableNumber < 1 || tableNumber > 8) {
                alert('Номер стола должен быть от 1 до 8');
                return;
            }
            
            const tablesResponse = await fetch('/api/tables/');
            const tablesData = await tablesResponse.json();
            const table = tablesData.data.find(t => t.number == tableNumber);
            
            if (!table) {
                alert('Стол с номером ' + tableNumber + ' не найден');
                return;
            }
            
            if (table.status !== 'free') {
                alert('Стол ' + tableNumber + ' занят или забронирован');
                return;
            }
            
            const items = cart.map(item => ({
                dish_id: item.id,
                quantity: item.quantity
            }));
            
            const response = await fetch('/api/orders/create/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    table_id: table.id,
                    items: items,
                    guest_count: guestCount
                })
            });
            const data = await response.json();
            
            if (data.success) {
                alert('Заказ номер ' + data.order_id + ' создан! Сумма: ' + data.total + ' ₽');
                localStorage.removeItem('guest_cart');
                updateGuestCartCount();
                const modalEl = document.getElementById('guestCartModal');
                if (modalEl) {
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                }
            } else {
                alert('Ошибка: ' + data.error);
            }
        }
        
        function checkAuth() {
            const role = localStorage.getItem('user_role');
            const logoutBtn = document.getElementById('logout-btn');
            const guestCartIcon = document.getElementById('guest-cart-icon');
            
            if (role) {
                logoutBtn.style.display = 'block';
                if (guestCartIcon) guestCartIcon.style.display = 'none';
            } else {
                if (guestCartIcon) guestCartIcon.style.display = 'flex';
                updateGuestCartCount();
            }
        }
        
        function logout() {
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_name');
            window.location.href = '/';
        }
        
        checkAuth();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
