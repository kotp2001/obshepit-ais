{% extends 'base.html' %}
{% block title %}Кухня - Повар{% endblock %}
{% block content %}
<div class="card" style="background: rgba(30,30,70,0.7); backdrop-filter: blur(10px); border: none;">
    <div class="card-header" style="background: rgba(20,20,50,0.8); color: white; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Кухня - Активные заказы</h4>
            <button class="btn btn-light btn-sm" onclick="loadOrders()">Обновить</button>
        </div>
    </div>
    <div class="card-body" id="orders-container">
        <div class="text-center py-5">
            <div class="spinner-border text-light" role="status"></div>
            <p class="mt-2 text-light">Загрузка заказов...</p>
        </div>
    </div>
</div>

<script>
    function loadOrders() {
        fetch('/api/orders/active/')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.data.length === 0) {
                        document.getElementById('orders-container').innerHTML = `
                            <div class="alert alert-success text-center" style="background: rgba(40,40,90,0.6); border: none; color: white;">
                                <h5>Нет активных заказов</h5>
                                <p class="mb-0">Все заказы выполнены</p>
                            </div>
                        `;
                        return;
                    }
                    
                    let html = '<div class="row">';
                    data.data.forEach(order => {
                        html += `
                            <div class="col-md-6 mb-4">
                                <div class="card" style="background: rgba(40,40,90,0.6); border: 1px solid rgba(255,255,255,0.1);">
                                    <div class="card-header" style="background: rgba(20,20,50,0.8); border-bottom: 1px solid rgba(255,255,255,0.1);">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <h5 class="mb-0" style="color: white;">Заказ номер ${order.id}</h5>
                                            <span class="badge bg-light text-dark">Стол ${order.table_number}</span>
                                        </div>
                                        <small style="color: rgba(255,255,255,0.7);">Создан: ${order.created_at}</small>
                                    </div>
                                    <div class="card-body">
                                        <ul class="list-group list-group-flush" style="background: transparent;">
                        `;
                        
                        order.items.forEach(item => {
                            let statusClass = '';
                            let statusText = '';
                            let cookingBtn = '';
                            let readyBtn = '';
                            
                            if (item.status === 'pending') {
                                statusClass = 'bg-info';
                                statusText = 'Ожидает';
                                cookingBtn = `<button class="btn btn-sm btn-warning ms-2" onclick="updateStatus(${item.id}, 'cooking')">Начать готовку</button>`;
                            } else if (item.status === 'cooking') {
                                statusClass = 'bg-warning';
                                statusText = 'Готовится';
                                readyBtn = `<button class="btn btn-sm btn-success ms-2" onclick="updateStatus(${item.id}, 'ready')">Готово</button>`;
                            } else if (item.status === 'ready') {
                                statusClass = 'bg-success';
                                statusText = 'Готов';
                            }
                            
                            html += `
                                <li class="list-group-item d-flex justify-content-between align-items-center" style="background: rgba(50,50,100,0.5); color: white; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <div>
                                        <strong>${item.dish_name}</strong>
                                        <span class="text-muted ms-2" style="color: #ffd700;">x${item.quantity}</span>
                                    </div>
                                    <div>
                                        <span class="badge ${statusClass}">${statusText}</span>
                                        ${cookingBtn}
                                        ${readyBtn}
                                    </div>
                                </li>
                            `;
                        });
                        
                        let orderStatusText = '';
                        if (order.status === 'new') orderStatusText = 'Новый заказ';
                        else if (order.status === 'cooking') orderStatusText = 'В процессе';
                        else if (order.status === 'ready') orderStatusText = 'Ожидает подачи';
                        
                        html += `
                                        </ul>
                                    </div>
                                    <div class="card-footer" style="background: rgba(20,20,50,0.6); border-top: 1px solid rgba(255,255,255,0.1);">
                                        <span class="badge bg-secondary">${orderStatusText}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('orders-container').innerHTML = html;
                } else {
                    document.getElementById('orders-container').innerHTML = '<div class="alert alert-danger">Ошибка загрузки заказов</div>';
                }
            });
    }
    
    function updateStatus(itemId, status) {
        fetch('/api/orders/update-item/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({item_id: itemId, status: status})
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                loadOrders();
            } else {
                alert('Ошибка обновления статуса');
            }
        });
    }
    
    loadOrders();
    setInterval(loadOrders, 5000);
</script>
{% endblock %}
