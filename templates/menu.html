{% extends 'base.html' %}
{% block title %}Меню{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header bg-dark text-white">
        <h4 class="mb-0"><i class="fas fa-book"></i> Наше меню</h4>
    </div>
    <div class="card-body">
        <div id="menu-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Загрузка меню...</p>
            </div>
        </div>
    </div>
</div>

<script>
    fetch('/api/dishes/')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const categories = {};
                data.data.forEach(dish => {
                    if (!categories[dish.category]) {
                        categories[dish.category] = [];
                    }
                    categories[dish.category].push(dish);
                });
                
                let html = '';
                for (const [category, dishes] of Object.entries(categories)) {
                    html += `<h3 class="mt-4 mb-3"><i class="fas fa-tag"></i> ${category}</h3>`;
                    html += '<div class="row">';
                    dishes.forEach(dish => {
                        html += `
                            <div class="col-md-6 col-lg-4 mb-3">
                                <div class="card dish-card h-100">
                                    <div class="card-body">
                                        <h5 class="card-title">${dish.name}</h5>
                                        <p class="card-text text-muted small">${dish.description || 'Без описания'}</p>
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="price">${dish.price} ₽</span>
                                            <button class="btn btn-add" onclick="addToCart(${dish.id}, '${dish.name}', ${dish.price})">
                                                <i class="fas fa-cart-plus"></i> В корзину
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }
                document.getElementById('menu-container').innerHTML = html;
            } else {
                document.getElementById('menu-container').innerHTML = '<div class="alert alert-danger">Ошибка загрузки меню</div>';
            }
        });
    
    function addToCart(id, name, price) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({id, name, price, quantity: 1});
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        alert(`${name} добавлено в корзину!`);
    }
</script>
{% endblock %}
