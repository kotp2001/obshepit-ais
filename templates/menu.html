{% extends 'base.html' %}
{% block title %}Меню{% endblock %}
{% block content %}
<div class="card" style="background: rgba(30,30,70,0.7); backdrop-filter: blur(10px); border: none;">
    <div class="card-header" style="background: rgba(20,20,50,0.8); color: white; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <h4 class="mb-0">Наше меню</h4>
    </div>
    <div class="card-body" id="menu-container">
        <div class="text-center py-5">
            <div class="spinner-border text-light" role="status"></div>
            <p class="mt-2 text-light">Загрузка меню...</p>
        </div>
    </div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('restaurant_cart') || '[]');
    
    function addToCart(id, name, price) {
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({id, name, price, quantity: 1});
        }
        localStorage.setItem('restaurant_cart', JSON.stringify(cart));
        
        const btn = event.target;
        btn.innerHTML = '✓';
        btn.classList.remove('btn-add');
        btn.classList.add('btn-success');
        setTimeout(() => {
            btn.innerHTML = '+';
            btn.classList.remove('btn-success');
            btn.classList.add('btn-add');
        }, 1000);
        
        updateCartButton();
    }
    
    function updateCartButton() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const count = cart.length;
        let cartBtn = document.getElementById('cart-total-btn');
        if (!cartBtn) {
            const nav = document.querySelector('.navbar-nav');
            if (nav) {
                cartBtn = document.createElement('li');
                cartBtn.className = 'nav-item';
                cartBtn.id = 'cart-total-btn';
                cartBtn.innerHTML = `<a class="nav-link" href="#" style="color: #ffd700 !important;">Корзина: ${count} | ${total} ₽</a>`;
                nav.appendChild(cartBtn);
            }
        } else {
            cartBtn.querySelector('a').innerHTML = `Корзина: ${count} | ${total} ₽`;
        }
    }
    
    function loadMenu() {
        fetch('/api/dishes/')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const categories = {};
                    data.data.forEach(dish => {
                        if (!categories[dish.category]) {
                            categories[dish.category] = [];
                        }
                        categories[dish.category].push(dish);
                    });
                    
                    let html = '';
                    for (const [category, dishes] of Object.entries(categories)) {
                        html += `<h4 class="mt-4 mb-3" style="color: #ffd700;">${category}</h4>`;
                        html += '<div class="row">';
                        dishes.forEach(dish => {
                            html += `
                                <div class="col-md-6 col-lg-4 mb-4">
                                    <div class="card h-100" style="background: rgba(40,40,90,0.6); border: 1px solid rgba(255,255,255,0.1);">
                                        <div class="card-body">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <h5 class="card-title" style="color: white;">${dish.name}</h5>
                                                <span class="price" style="color: #ffd700; font-size: 1.2rem;">${dish.price} ₽</span>
                                            </div>
                                            <p class="card-text" style="color: rgba(255,255,255,0.7);">${dish.description || 'Нет описания'}</p>
                                            <button class="btn btn-add w-100 mt-2" onclick="addToCart(${dish.id}, '${dish.name}', ${dish.price})">
                                                +
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        html += '</div>';
                    }
                    document.getElementById('menu-container').innerHTML = html;
                    updateCartButton();
                }
            });
    }
    
    loadMenu();
</script>

<style>
    .btn-add {
        background: #28a745;
        color: white;
        border-radius: 25px;
        padding: 8px;
        transition: all 0.1s ease;
    }
    .btn-add:hover {
        background: #218838;
        transform: translateY(-1px);
    }
    .btn-add:active {
        transform: translateY(1px);
    }
</style>
{% endblock %}
