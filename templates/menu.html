{% extends 'base.html' %}
{% block title %}Меню{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h4 class="mb-0">Наше меню</h4>
    </div>
    <div class="card-body" id="menu-container">
        <div class="text-center py-5">
            <div class="spinner-border text-light" role="status"></div>
            <p class="mt-2 text-light">Загрузка меню...</p>
        </div>
    </div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('restaurant_cart') || '[]');
    
    function updateCartDisplay() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        let cartBtn = document.getElementById('cart-total-btn');
        if (!cartBtn) {
            const nav = document.querySelector('.navbar-nav');
            if (nav) {
                cartBtn = document.createElement('li');
                cartBtn.className = 'nav-item';
                cartBtn.id = 'cart-total-btn';
                cartBtn.innerHTML = `<a class="nav-link" href="#" style="color: #ffd700 !important; cursor: pointer;" onclick="showCartModal()">Корзина: ${count} | ${total} ₽</a>`;
                nav.appendChild(cartBtn);
            }
        } else {
            cartBtn.querySelector('a').innerHTML = `Корзина: ${count} | ${total} ₽`;
        }
    }
    
    function showCartModal() {
        if (cart.length === 0) {
            alert('Корзина пуста');
            return;
        }
        
        let items = '';
        let total = 0;
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            items += `
                <div class="d-flex justify-content-between align-items-center mb-2 pb-2" style="border-bottom: 1px solid rgba(255,255,255,0.2);">
                    <div>
                        <strong>${item.name}</strong>
                        <div>${item.price} ₽ × ${item.quantity}</div>
                    </div>
                    <div>
                        ${itemTotal} ₽
                        <button class="btn btn-sm btn-danger ms-2" onclick="removeFromCart(${index}); location.reload();">Удалить</button>
                    </div>
                </div>
            `;
        });
        
        const modalHtml = `
            <div class="modal fade" id="cartModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" style="color: #ffd700;">Моя корзина</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            ${items}
                            <hr style="border-color: rgba(255,255,255,0.2);">
                            <div class="d-flex justify-content-between">
                                <strong>Итого:</strong>
                                <strong style="color: #ffd700; font-size: 1.3rem;">${total} ₽</strong>
                            </div>
                            <div class="mt-3">
                                <label class="form-label">Количество гостей</label>
                                <input type="number" id="checkout-guests" class="form-control" value="2" min="1">
                            </div>
                            <div class="mt-3">
                                <label class="form-label">Выберите стол (номер)</label>
                                <input type="number" id="checkout-table" class="form-control" placeholder="Номер стола" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-primary" onclick="confirmOrder()">Подтвердить заказ</button>
                            <button class="btn btn-secondary" data-bs-dismiss="modal">Продолжить выбор</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        const oldModal = document.getElementById('cartModal');
        if (oldModal) oldModal.remove();
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = new bootstrap.Modal(document.getElementById('cartModal'));
        modal.show();
    }
    
    function confirmOrder() {
        const tableNumber = document.getElementById('checkout-table').value;
        const guestCount = document.getElementById('checkout-guests').value;
        
        if (!tableNumber) {
            alert('Пожалуйста, укажите номер стола');
            return;
        }
        
        const items = cart.map(item => ({
            dish_id: item.id,
            quantity: item.quantity
        }));
        
        fetch('/api/tables/')
            .then(response => response.json())
            .then(data => {
                const table = data.data.find(t => t.number == tableNumber);
                if (!table) {
                    alert('Стол с номером ' + tableNumber + ' не найден');
                    return;
                }
                
                if (table.status !== 'free') {
                    alert('Стол ' + tableNumber + ' занят или забронирован. Выберите другой стол.');
                    return;
                }
                
                fetch('/api/orders/create/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        table_id: table.id,
                        items: items,
                        guest_count: guestCount
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Заказ номер ' + data.order_id + ' создан! Сумма: ' + data.total + ' ₽');
                        localStorage.removeItem('restaurant_cart');
                        cart = [];
                        updateCartDisplay();
                        const modalEl = document.getElementById('cartModal');
                        if (modalEl) {
                            const modalInstance = bootstrap.Modal.getInstance(modalEl);
                            if (modalInstance) modalInstance.hide();
                        }
                    } else {
                        alert('Ошибка: ' + data.error);
                    }
                });
            });
    }
    
    function removeFromCart(index) {
        cart.splice(index, 1);
        localStorage.setItem('restaurant_cart', JSON.stringify(cart));
        updateCartDisplay();
    }
    
    function addToCart(id, name, price) {
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({id, name, price, quantity: 1});
        }
        localStorage.setItem('restaurant_cart', JSON.stringify(cart));
        updateCartDisplay();
        
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.innerHTML = '✓';
        setTimeout(() => {
            btn.innerHTML = originalText;
        }, 800);
    }
    
    function loadMenu() {
        fetch('/api/dishes/')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const categories = {};
                    data.data.forEach(dish => {
                        if (!categories[dish.category]) {
                            categories[dish.category] = [];
                        }
                        categories[dish.category].push(dish);
                    });
                    
                    let html = '';
                    for (const [category, dishes] of Object.entries(categories)) {
                        html += `<h4 class="mt-4 mb-3" style="color: #ffd700;">${category}</h4>`;
                        html += '<div class="row">';
                        dishes.forEach(dish => {
                            html += `
                                <div class="col-md-6 col-lg-4 mb-4">
                                    <div class="card h-100">
                                        <div class="card-body">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <h5 class="card-title" style="color: white;">${dish.name}</h5>
                                                <span class="price" style="color: #ffd700; font-size: 1.2rem;">${dish.price} ₽</span>
                                            </div>
                                            <p class="card-text" style="color: rgba(255,255,255,0.7);">${dish.description || 'Нет описания'}</p>
                                            <button class="btn w-100 mt-2" style="background: #28a745; color: white;" onclick="addToCart(${dish.id}, '${dish.name}', ${dish.price})">Добавить в корзину</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        html += '</div>';
                    }
                    document.getElementById('menu-container').innerHTML = html;
                    updateCartDisplay();
                }
            });
    }
    
    loadMenu();
</script>
{% endblock %}
