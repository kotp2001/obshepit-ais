{% extends 'base.html' %}
{% block title %}Меню ресторана{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">Наше меню</h4>
        </div>
        <div class="card-body" id="menu-container">
            <div class="text-center py-5">
                <div class="spinner-border text-light" role="status"></div>
                <p class="mt-2">Загрузка меню...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Функция добавления в корзину для гостя
    window.addToGuestCart = function(id, name, price) {
        let cart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({id: id, name: name, price: price, quantity: 1});
        }
        localStorage.setItem('guest_cart', JSON.stringify(cart));
        
        // Визуальный эффект на кнопке
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.innerHTML = '✓ Добавлено';
        btn.style.background = '#28a745';
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.background = '#2a5a2a';
        }, 1000);
        
        // Обновляем счетчик корзины
        updateGuestCartCount();
    };
    
    function updateGuestCartCount() {
        const cart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
        const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        const cartCountSpan = document.getElementById('cart-count');
        if (cartCountSpan) {
            cartCountSpan.innerText = totalCount;
        }
    }
    
    async function loadMenu() {
        try {
            const response = await fetch('/api/dishes/');
            const data = await response.json();
            
            if (data.success && data.data) {
                // Группируем блюда по категориям
                const categories = {};
                data.data.forEach(dish => {
                    if (!categories[dish.category]) {
                        categories[dish.category] = [];
                    }
                    categories[dish.category].push(dish);
                });
                
                let html = '';
                for (const [category, dishes] of Object.entries(categories)) {
                    html += `<h4 class="mt-4 mb-3" style="color: #ffd700; border-left: 3px solid #ffd700; padding-left: 15px;">${category}</h4>`;
                    html += '<div class="row">';
                    
                    dishes.forEach(dish => {
                        html += `
                            <div class="col-md-6 col-lg-4 mb-4">
                                <div class="card h-100" style="transition: transform 0.1s ease;">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-start">
                                            <h5 class="card-title" style="color: white; font-size: 1.1rem;">${escapeHtml(dish.name)}</h5>
                                            <span class="price" style="color: #ffd700; font-size: 1.2rem; font-weight: bold;">${dish.price} ₽</span>
                                        </div>
                                        <p class="card-text" style="color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-top: 8px;">${escapeHtml(dish.description) || 'Нет описания'}</p>
                                        <button class="btn btn-success w-100 mt-3" style="background: #2a5a2a; transition: transform 0.1s ease;" onclick="addToGuestCart(${dish.id}, '${escapeHtml(dish.name)}', ${dish.price})">
                                            Добавить в корзину
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }
                
                if (html === '') {
                    html = '<p class="text-center text-white">Меню временно недоступно</p>';
                }
                
                document.getElementById('menu-container').innerHTML = html;
                updateGuestCartCount();
            } else {
                document.getElementById('menu-container').innerHTML = '<p class="text-center text-danger">Ошибка загрузки меню</p>';
            }
        } catch (error) {
            console.error('Error loading menu:', error);
            document.getElementById('menu-container').innerHTML = '<p class="text-center text-danger">Ошибка соединения с сервером</p>';
        }
    }
    
    // Функция для экранирования HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    
    // Загружаем меню при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        loadMenu();
    });
</script>

<style>
    .card {
        transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .card:active {
        transform: scale(0.98);
    }
    .btn-success {
        transition: transform 0.1s ease;
    }
    .btn-success:active {
        transform: scale(0.97);
    }
</style>
{% endblock %}
