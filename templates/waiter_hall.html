{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Зал ресторана</h4>
            <button class="btn btn-warning btn-sm" onclick="loadTables()">Обновить</button>
        </div>
    </div>
    <div class="card-body">
        <div id="hall-container" class="row">
            <div class="text-center py-5">
                <div class="spinner-border text-light" role="status"></div>
                <p class="mt-2">Загрузка столов...</p>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadTables() {
        try {
            const response = await fetch('/api/tables/');
            const data = await response.json();
            
            if (data.success && data.data) {
                let html = '';
                for (const table of data.data) {
                    let bgColor = '';
                    let statusText = '';
                    let clickHandler = '';
                    
                    if (table.status === 'free') {
                        bgColor = 'rgba(40,90,40,0.7)';
                        statusText = 'Свободен';
                        clickHandler = `onclick="createOrderForTable(${table.id}, ${table.number})" style="cursor: pointer;"`;
                    } else if (table.status === 'occupied') {
                        bgColor = 'rgba(140,40,40,0.7)';
                        statusText = 'Занят';
                        clickHandler = 'style="cursor: not-allowed; opacity: 0.6;"';
                    } else {
                        bgColor = 'rgba(140,100,30,0.7)';
                        statusText = 'Забронирован';
                        clickHandler = 'style="cursor: not-allowed; opacity: 0.6;"';
                    }
                    
                    html += `
                        <div class="col-md-3 mb-3">
                            <div class="card text-center" style="background: ${bgColor};" ${clickHandler}>
                                <div class="card-body">
                                    <i class="fas fa-chair fa-2x mb-2" style="color: #ffd700;"></i>
                                    <h3 style="color: white;">Стол ${table.number}</h3>
                                    <p style="color: rgba(255,255,255,0.8);">${table.seats} мест</p>
                                    <span class="badge bg-light" style="color: #1a1a4a;">${statusText}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('hall-container').innerHTML = html;
            }
        } catch (error) {
            document.getElementById('hall-container').innerHTML = '<p class="text-center text-danger">Ошибка загрузки столов</p>';
        }
    }
    
    function createOrderForTable(tableId, tableNumber) {
        const items = [];
        let itemsHtml = '';
        
        fetch('/api/dishes/')
            .then(response => response.json())
            .then(data => {
                if (data.success && data.data) {
                    const categories = {};
                    data.data.forEach(dish => {
                        if (!categories[dish.category]) {
                            categories[dish.category] = [];
                        }
                        categories[dish.category].push(dish);
                    });
                    
                    let menuHtml = '';
                    for (const [category, dishes] of Object.entries(categories)) {
                        menuHtml += `<h6 style="color: #ffd700; margin-top: 15px;">${category}</h6>`;
                        menuHtml += '<div class="row">';
                        dishes.forEach(dish => {
                            menuHtml += `
                                <div class="col-md-6 mb-2">
                                    <div style="background: rgba(40,40,90,0.5); border-radius: 8px; padding: 8px;">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <strong style="color: white;">${dish.name}</strong>
                                                <div style="color: #ffd700;">${dish.price} ₽</div>
                                            </div>
                                            <button class="btn btn-sm btn-success" onclick="addToCart(${dish.id}, '${dish.name}', ${dish.price})">+</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        menuHtml += '</div>';
                    }
                    
                    const modalHtml = `
                        <div class="modal fade" id="orderModal" tabindex="-1">
                            <div class="modal-dialog modal-xl">
                                <div class="modal-content" style="background: rgba(20,20,60,0.95);">
                                    <div class="modal-header">
                                        <h5 class="modal-title" style="color: #ffd700;">Заказ для стола ${tableNumber}</h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        <div class="row">
                                            <div class="col-md-7">
                                                ${menuHtml}
                                            </div>
                                            <div class="col-md-5">
                                                <div style="background: rgba(30,30,80,0.8); border-radius: 10px; padding: 15px;">
                                                    <h5 style="color: #ffd700;">Корзина</h5>
                                                    <div id="cart-items">Корзина пуста</div>
                                                    <hr>
                                                    <div class="d-flex justify-content-between">
                                                        <strong>Итого:</strong>
                                                        <span id="total" style="color: #ffd700;">0 ₽</span>
                                                    </div>
                                                    <div class="mt-3">
                                                        <label>Количество гостей</label>
                                                        <input type="number" id="guest-count" class="form-control" value="2" min="1">
                                                    </div>
                                                    <div class="mt-3 d-grid gap-2">
                                                        <button class="btn btn-warning" onclick="submitOrder(${tableId})">Оформить заказ</button>
                                                        <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    const oldModal = document.getElementById('orderModal');
                    if (oldModal) oldModal.remove();
                    
                    document.body.insertAdjacentHTML('beforeend', modalHtml);
                    
                    window.currentCart = [];
                    window.updateCartDisplay = function() {
                        let total = 0;
                        let html = '';
                        if (window.currentCart.length === 0) {
                            html = '<p class="text-center">Корзина пуста</p>';
                        } else {
                            window.currentCart.forEach((item, idx) => {
                                total += item.price * item.quantity;
                                html += `
                                    <div class="d-flex justify-content-between mb-2">
                                        <div>${item.name} x${item.quantity}</div>
                                        <div>${item.price * item.quantity} ₽ <button class="btn btn-sm btn-danger" onclick="removeFromCart(${idx})">X</button></div>
                                    </div>
                                `;
                            });
                        }
                        document.getElementById('cart-items').innerHTML = html;
                        document.getElementById('total').innerHTML = total + ' ₽';
                    };
                    
                    window.addToCart = function(id, name, price) {
                        const existing = window.currentCart.find(item => item.id === id);
                        if (existing) {
                            existing.quantity++;
                        } else {
                            window.currentCart.push({id, name, price, quantity: 1});
                        }
                        window.updateCartDisplay();
                    };
                    
                    window.removeFromCart = function(index) {
                        window.currentCart.splice(index, 1);
                        window.updateCartDisplay();
                    };
                    
                    window.submitOrder = function(tableId) {
                        if (window.currentCart.length === 0) {
                            alert('Добавьте блюда в заказ');
                            return;
                        }
                        
                        const items = window.currentCart.map(item => ({
                            dish_id: item.id,
                            quantity: item.quantity
                        }));
                        
                        const guestCount = document.getElementById('guest-count').value;
                        
                        fetch('/api/orders/create/', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                table_id: tableId,
                                items: items,
                                guest_count: guestCount
                            })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                alert('Заказ номер ' + data.order_id + ' создан! Сумма: ' + data.total + ' ₽');
                                const modal = bootstrap.Modal.getInstance(document.getElementById('orderModal'));
                                if (modal) modal.hide();
                                loadTables();
                            } else {
                                alert('Ошибка: ' + data.error);
                            }
                        });
                    };
                    
                    window.updateCartDisplay();
                    const modal = new bootstrap.Modal(document.getElementById('orderModal'));
                    modal.show();
                }
            });
    }
    
    loadTables();
</script>
{% endblock %}
