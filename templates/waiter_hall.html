{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="card">
        <div class="card-header bg-dark text-white py-3 d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="fas fa-chair me-2"></i> Зал ресторана</h4>
            <div>
                <button class="btn btn-light btn-sm" onclick="loadTables()">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
            </div>
        </div>
        <div class="card-body">
            <div id="hall-container" class="row">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Загрузка схемы зала...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для создания заказа -->
<div id="order-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="fas fa-shopping-cart me-2"></i> Создание заказа</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-7">
                        <h5><i class="fas fa-book me-2"></i> Меню</h5>
                        <div id="menu-list" style="max-height: 400px; overflow-y: auto;"></div>
                    </div>
                    <div class="col-md-5">
                        <div class="card">
                            <div class="card-header bg-dark text-white">
                                <h5 class="mb-0"><i class="fas fa-cart-shopping me-2"></i> Корзина</h5>
                            </div>
                            <div class="card-body">
                                <div id="cart-items"></div>
                                <hr>
                                <div class="d-flex justify-content-between">
                                    <strong>Итого:</strong>
                                    <span class="total" id="total">0 ₽</span>
                                </div>
                                <div class="mt-3">
                                    <label class="fw-bold">Количество гостей</label>
                                    <input type="number" id="guest-count" class="form-control mt-1" value="2" min="1">
                                </div>
                                <div class="mt-3 d-grid gap-2">
                                    <button class="btn btn-primary" onclick="createOrder()">Оформить заказ</button>
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentTableId = null;
    let cart = [];
    let modal;
    
    function loadTables() {
        fetch('/api/tables/')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    let html = '<div class="row">';
                    data.data.forEach(table => {
                        let statusClass = '';
                        let statusText = '';
                        let clickable = '';
                        
                        if (table.status === 'free') {
                            statusClass = 'table-free';
                            statusText = 'Свободен';
                            clickable = 'onclick="openOrderModal(' + table.id + ')"';
                        } else if (table.status === 'occupied') {
                            statusClass = 'table-occupied';
                            statusText = 'Занят';
                            clickable = '';
                        } else {
                            statusClass = 'table-reserved';
                            statusText = 'Забронирован';
                            clickable = '';
                        }
                        
                        html += `
                            <div class="col-md-3 mb-3">
                                <div class="card table-card ${statusClass}" ${clickable}>
                                    <div class="card-body text-center">
                                        <i class="fas fa-chair fa-2x mb-2"></i>
                                        <h3>Стол ${table.number}</h3>
                                        <p>${table.seats} мест</p>
                                        <span class="badge bg-dark">${statusText}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('hall-container').innerHTML = html;
                }
            });
    }
    
    function openOrderModal(tableId) {
        currentTableId = tableId;
        cart = [];
        updateCart();
        loadMenu();
        modal = new bootstrap.Modal(document.getElementById('order-modal'));
        modal.show();
    }
    
    function loadMenu() {
        fetch('/api/dishes/')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const categories = {};
                    data.data.forEach(dish => {
                        if (!categories[dish.category]) {
                            categories[dish.category] = [];
                        }
                        categories[dish.category].push(dish);
                    });
                    
                    let html = '';
                    for (const [category, dishes] of Object.entries(categories)) {
                        html += `<h6 class="mt-3 mb-2 text-primary">${category}</h6>`;
                        html += '<div class="row">';
                        dishes.forEach(dish => {
                            html += `
                                <div class="col-md-6 mb-2">
                                    <div class="card">
                                        <div class="card-body py-2">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div>
                                                    <strong>${dish.name}</strong>
                                                    <small class="d-block text-muted">${dish.price} ₽</small>
                                                </div>
                                                <button class="btn btn-sm btn-add" onclick="addToCart(${dish.id}, '${dish.name}', ${dish.price})">
                                                    <i class="fas fa-plus"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        html += '</div>';
                    }
                    document.getElementById('menu-list').innerHTML = html;
                }
            });
    }
    
    function addToCart(id, name, price) {
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({id, name, price, quantity: 1});
        }
        updateCart();
        
        const btn = event.target.closest('button');
        btn.innerHTML = '<i class="fas fa-check"></i>';
        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-plus"></i>';
        }, 500);
    }
    
    function updateCart() {
        let total = 0;
        let html = '';
        
        if (cart.length === 0) {
            html = '<p class="text-muted text-center">Корзина пуста</p>';
        } else {
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                html += `
                    <div class="cart-item d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                        <div>
                            <strong>${item.name}</strong>
                            <div class="small">${item.price} ₽ × ${item.quantity}</div>
                        </div>
                        <div>
                            <span class="me-2">${item.price * item.quantity} ₽</span>
                            <button class="btn btn-sm btn-danger" onclick="removeFromCart(${index})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }
        
        document.getElementById('cart-items').innerHTML = html;
        document.getElementById('total').innerHTML = total + ' ₽';
    }
    
    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
    }
    
   function createOrder() {
    if (cart.length === 0) {
        alert('Добавьте блюда в заказ');
        return;
    }
    
    const items = cart.map(item => ({
        dish_id: item.id,
        quantity: item.quantity
    }));
    
    const guestCount = document.getElementById('guest-count').value;
    
    fetch('/api/orders/create/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            table_id: currentTableId,
            items: items,
            guest_count: guestCount
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Заказ номер ' + data.order_id + ' создан! Сумма: ' + data.total + ' ₽');
            modal.hide();
            loadTables();
        } else {
            alert('Ошибка: ' + data.error);
        }
    });
}
    
    loadTables();
    setInterval(loadTables, 30000);
</script>

<style>
    .table-card {
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .table-card:active {
        transform: scale(0.98);
    }
    .table-occupied, .table-reserved {
        cursor: not-allowed;
        opacity: 0.7;
    }
    .btn-add {
        background: #28a745;
        color: white;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .btn-add:hover {
        background: #218838;
        transform: scale(1.05);
    }
    .btn-add:active {
        transform: scale(0.95);
    }
</style>
{% endblock %}
