{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Зал ресторана</h4>
            <button class="btn btn-light btn-sm" onclick="loadTables()">Обновить</button>
        </div>
    </div>
    <div class="card-body" id="hall-container">
        <div class="text-center py-5">
            <div class="spinner-border text-light" role="status"></div>
            <p class="mt-2 text-light">Загрузка схемы зала...</p>
        </div>
    </div>
</div>

<!-- Модальное окно для создания заказа -->
<div id="order-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Создание заказа</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-7">
                        <h5 style="color: #ffd700;">Меню</h5>
                        <div id="menu-list" style="max-height: 400px; overflow-y: auto;"></div>
                    </div>
                    <div class="col-md-5">
                        <div class="card" style="background: rgba(20,20,50,0.9);">
                            <div class="card-header" style="background: rgba(15,15,40,0.9);">
                                <h5 class="mb-0" style="color: #ffd700;">Корзина</h5>
                            </div>
                            <div class="card-body">
                                <div id="cart-items" style="min-height: 150px;"></div>
                                <hr style="border-color: rgba(255,255,255,0.2);">
                                <div class="d-flex justify-content-between">
                                    <strong style="color: white;">Итого:</strong>
                                    <span class="total" id="total" style="color: #ffd700; font-size: 1.3rem;">0 ₽</span>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label">Количество гостей</label>
                                    <input type="number" id="guest-count" class="form-control" value="2" min="1">
                                </div>
                                <div class="mt-3 d-grid gap-2">
                                    <button class="btn btn-primary" onclick="createOrder()">Оформить заказ</button>
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentTableId = null;
    let cart = [];
    let modal;
    
    function loadTables() {
        fetch('/api/tables/')
            .then(response => response.json())
            .then(data => {
                if (data.success && data.data) {
                    let html = '<div class="row">';
                    data.data.forEach(table => {
                        let statusClass = '';
                        let statusText = '';
                        let clickable = '';
                        let bgColor = '';
                        
                        if (table.status === 'free') {
                            statusClass = 'table-free';
                            statusText = 'Свободен';
                            clickable = 'onclick="openOrderModal(' + table.id + ')"';
                            bgColor = 'rgba(40,90,40,0.7)';
                        } else if (table.status === 'occupied') {
                            statusClass = 'table-occupied';
                            statusText = 'Занят';
                            clickable = '';
                            bgColor = 'rgba(140,40,40,0.7)';
                        } else {
                            statusClass = 'table-reserved';
                            statusText = 'Забронирован';
                            clickable = '';
                            bgColor = 'rgba(140,100,30,0.7)';
                        }
                        
                        html += `
                            <div class="col-md-3 mb-3">
                                <div class="card table-card ${statusClass}" ${clickable} style="background: ${bgColor}; cursor: ${clickable ? 'pointer' : 'not-allowed'};">
                                    <div class="card-body text-center">
                                        <i class="fas fa-chair fa-2x mb-2" style="color: #ffd700;"></i>
                                        <h3 style="color: white;">Стол ${table.number}</h3>
                                        <p style="color: rgba(255,255,255,0.8);">${table.seats} мест</p>
                                        <span class="badge ${table.status === 'free' ? 'bg-success' : (table.status === 'occupied' ? 'bg-danger' : 'bg-warning')}" style="color: white;">${statusText}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('hall-container').innerHTML = html;
                } else {
                    document.getElementById('hall-container').innerHTML = '<p class="text-center text-danger">Ошибка загрузки столов. Проверьте соединение.</p>';
                }
            })
            .catch(error => {
                document.getElementById('hall-container').innerHTML = '<p class="text-center text-danger">Ошибка соединения с сервером</p>';
                console.error('Error:', error);
            });
    }
    
    function openOrderModal(tableId) {
        currentTableId = tableId;
        cart = [];
        updateCart();
        loadMenu();
        modal = new bootstrap.Modal(document.getElementById('order-modal'));
        modal.show();
    }
    
    function loadMenu() {
        fetch('/api/dishes/')
            .then(response => response.json())
            .then(data => {
                if (data.success && data.data) {
                    const categories = {};
                    data.data.forEach(dish => {
                        if (!categories[dish.category]) {
                            categories[dish.category] = [];
                        }
                        categories[dish.category].push(dish);
                    });
                    
                    let html = '';
                    for (const [category, dishes] of Object.entries(categories)) {
                        html += `<h6 class="mt-3 mb-2" style="color: #ffd700;">${category}</h6>`;
                        html += '<div class="row">';
                        dishes.forEach(dish => {
                            html += `
                                <div class="col-md-6 mb-2">
                                    <div class="card" style="background: rgba(40,40,90,0.6);">
                                        <div class="card-body py-2">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div>
                                                    <strong style="color: white;">${dish.name}</strong>
                                                    <small class="d-block" style="color: #ffd700;">${dish.price} ₽</small>
                                                </div>
                                                <button class="btn btn-sm btn-add" onclick="addToCart(${dish.id}, '${dish.name}', ${dish.price})">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        html += '</div>';
                    }
                    document.getElementById('menu-list').innerHTML = html;
                } else {
                    document.getElementById('menu-list').innerHTML = '<p class="text-center text-danger">Ошибка загрузки меню</p>';
                }
            });
    }
    
    function addToCart(id, name, price) {
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({id, name, price, quantity: 1});
        }
        updateCart();
    }
    
    function updateCart() {
        let total = 0;
        let html = '';
        
        if (cart.length === 0) {
            html = '<p class="text-muted text-center">Корзина пуста</p>';
        } else {
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                html += `
                    <div class="cart-item d-flex justify-content-between align-items-center mb-2 pb-2" style="border-bottom: 1px solid rgba(255,255,255,0.2);">
                        <div>
                            <strong style="color: white;">${item.name}</strong>
                            <div style="color: #ffd700;">${item.price} ₽ × ${item.quantity}</div>
                        </div>
                        <div>
                            <span style="color: white;" class="me-2">${item.price * item.quantity} ₽</span>
                            <button class="btn btn-sm btn-danger" onclick="removeFromCart(${index})">X</button>
                        </div>
                    </div>
                `;
            });
        }
        
        document.getElementById('cart-items').innerHTML = html;
        document.getElementById('total').innerHTML = total + ' ₽';
    }
    
    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
    }
    
    function createOrder() {
        if (cart.length === 0) {
            alert('Добавьте блюда в заказ');
            return;
        }
        
        const items = cart.map(item => ({
            dish_id: item.id,
            quantity: item.quantity
        }));
        
        const guestCount = document.getElementById('guest-count').value;
        
        fetch('/api/orders/create/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                table_id: currentTableId,
                items: items,
                guest_count: guestCount
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('Заказ номер ' + data.order_id + ' создан! Сумма: ' + data.total + ' ₽');
                modal.hide();
                loadTables();
            } else {
                alert('Ошибка: ' + data.error);
            }
        });
    }
    
    // Загружаем столы при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        loadTables();
    });
</script>

<style>
    .btn-add {
        background: #28a745;
        color: white;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.1s ease;
    }
    .btn-add:hover {
        background: #218838;
        transform: scale(1.05);
    }
    .btn-add:active {
        transform: scale(0.95);
    }
    .table-card {
        transition: all 0.1s ease;
    }
    .table-card:active {
        transform: scale(0.98);
    }
</style>
{% endblock %}
